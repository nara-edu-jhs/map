<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }

.popup-content {
  width:220px;
  font-size:14px;
}

.popup-content img {
  width:200px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ★ここにGASのURLを貼る
const apiURL = "https://script.google.com/a/macros/e-net.nara.jp/s/AKfycby78qyH9wB4daBLqpyRZCgtnFlp3cNsAoRbeXrhcQw4GeKWqyFmu0OzGLP7PlvR5CHt/exec";

// 地図初期設定
const map = L.map('map').setView([34.6965, 135.8166], 14);

// 地図タイル
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// データ取得して表示
fetch(apiURL)
  .then(res => res.json())
  .then(data => {

    data.forEach(item => {

      if (isNaN(item.lat) || isNaN(item.lng)) return;

      const content = `
        <div class="popup-content">
          <b>${item.grade}年 ${item.className}組 ${item.number}番</b><br>
          ${item.comment || ""}<br>
          ${item.image ? `<img src="${item.image}">` : ""}
        </div>
      `;

      L.marker([item.lat, item.lng])
        .addTo(map)
        .bindPopup(content);

    });

  });

</script>

</body>
</html>
