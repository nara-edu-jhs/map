<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投稿マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html, body { height:100%; margin:0; }
#map { height:100%; }

.popup {
  width:220px;
  font-size:14px;
}

.popup input, .popup textarea {
  width:100%;
  margin-bottom:5px;
}

.popup img {
  width:200px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ★GASのURLを入れる
const apiURL = "https://script.google.com/a/macros/e-net.nara.jp/s/AKfycbz0oZiBtHbz8ad4WbOHAK-ogpAnNNbf5Jyp8w8WYy4jYo3z-zwgerDo3-BghaQv86Ko/exec";

const map = L.map('map').setView([34.6965, 135.8166], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// ▼ 既存データ表示
function loadData(){

  fetch(apiURL)
    .then(res => res.json())
    .then(data => {

      data.forEach(item => {

        if (isNaN(item.lat) || isNaN(item.lng)) return;

        const content = `
          <div class="popup">
            <b>${item.name}</b><br>
            ${item.comment || ""}<br>
            ${item.image ? `<img src="${item.image}">` : ""}
          </div>
        `;

        L.marker([item.lat, item.lng])
          .addTo(map)
          .bindPopup(content);

      });

    });

}

loadData();


// ▼ 地図クリックで入力
map.on('click', function(e){

  const lat = e.latlng.lat;
  const lng = e.latlng.lng;

  const form = `
    <div class="popup">
      名前:<br>
      <input id="name"><br>
      コメント:<br>
      <textarea id="comment"></textarea><br>
      画像URL:<br>
      <input id="image"><br>
      <button onclick="sendData(${lat}, ${lng})">送信</button>
    </div>
  `;

  L.popup()
    .setLatLng(e.latlng)
    .setContent(form)
    .openOn(map);

});


// ▼ 送信処理
function sendData(lat, lng){

  const name = document.getElementById("name").value;
  const comment = document.getElementById("comment").value;
  const image = document.getElementById("image").value;

  fetch(apiURL, {
    method: "POST",
    body: JSON.stringify({
      name, comment, image, lat, lng
    })
  })
  .then(() => {
    alert("投稿しました！");
    location.reload();
  });

}

</script>

</body>
</html>
